name: Test

on:
  pull_request:
    paths-ignore:
    - '**.md'
  push:
    paths-ignore:
    - '**.md'

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

    - name: Setup Tools
      uses: ./.github/actions/setup-tools

    - name: Setup NPM packages
      uses: ./.github/actions/setup-npm

    - name: Run lint
      run: pnpm lint

  unit-test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

    - name: Setup Tools
      uses: ./.github/actions/setup-tools

    - name: Setup NPM packages
      uses: ./.github/actions/setup-npm

    - name: Run unit tests
      run: pnpm test
