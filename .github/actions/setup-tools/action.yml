name: Setup Tools
description: Setup required tools in the workspace

runs:
  using: composite
  steps:
  - name: Setup Tools
    uses: egose/actions/asdf-tools@a3dfd344085e108db78c4d5654dede5b462b35ca

  - name: Install python tools
    run: |
      pip install -r requirements.txt
      asdf reshim
    shell: bash
