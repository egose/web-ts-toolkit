name: Setup Tools
description: Setup required tools in the workspace

runs:
  using: composite
  steps:
  - name: Setup Tools
    uses: egose/actions/asdf-tools@ef042a54d9446c85fdd1044d342c614b5353f812

  - name: Install python tools
    run: |
      pip install -r requirements.txt
      asdf reshim
    shell: bash
