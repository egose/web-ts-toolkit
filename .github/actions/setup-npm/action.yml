name: Setup NPM Packages
description: Setup required NPM packages with caching for pnpm
runs:
  using: composite
  steps:
  - name: Setup Tools
    uses: egose/actions/pnpm-packages@582b6748271fe29043a0b8883c14d18184a6570a
    with:
      frozen: 'true'
      ignore-scripts: 'true'
      paths: |
        .
        website
