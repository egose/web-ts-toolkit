name: Setup NPM Packages
description: Setup required NPM packages with caching for pnpm
runs:
  using: composite
  steps:
  - name: Setup Tools
    uses: egose/actions/pnpm-packages@c90a739e44e3f1fe6ccdc2581bd908db3c302ee4
    with:
      frozen: 'true'
      ignore-scripts: 'true'
      paths: |
        .
        website
