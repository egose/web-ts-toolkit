name: Setup NPM Packages
description: Setup required NPM packages with caching for pnpm
runs:
  using: composite
  steps:
  - name: Setup Tools
    uses: egose/actions/pnpm-packages@a3dfd344085e108db78c4d5654dede5b462b35ca
    with:
      frozen: 'true'
      ignore-scripts: 'true'
      paths: |
        .
        website
